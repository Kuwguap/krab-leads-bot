services:
  # Telegram Bot - Background Worker (polling mode)
  - type: worker
    name: krabsleads-bot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: MONDAY_API_KEY
        sync: false
      - key: MONDAY_BOARD_ID
        sync: false
      - key: ONETIMESECRET_USERNAME
        sync: false
      - key: ONETIMESECRET_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: DRIVER_TELEGRAM_ID
        sync: false
      - key: GROUP_TELEGRAM_ID
        sync: false
      - key: SUPERVISORY_TELEGRAM_ID
        sync: false

  # Admin Dashboard - Web Service (Flask API)
  - type: web
    name: krabsleads-admin
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python admin_dashboard.py
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: ADMIN_PORT
        value: "10000"


