# Render Blueprint: KrabsLeads
# Web: admin dashboard API (Flask). Worker: Telegram bot (single instance; do not scale to avoid 409 Conflict).
previews:
  generation: off
services:
  - type: web
    name: krabsleads-admin
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python admin_dashboard.py
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
  - type: worker
    name: krabsleads-bot
    runtime: python
    numInstances: 1
    maxShutdownDelaySeconds: 60
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: MONDAY_API_KEY
        sync: false
      - key: MONDAY_BOARD_ID
        sync: false
      - key: ONETIMESECRET_USERNAME
        sync: false
      - key: ONETIMESECRET_API_KEY
        sync: false
      - key: ONETIMESECRET_URL
        sync: false
      - key: ONETIMESECRET_LINK_BASE
        sync: false
      - key: ONETIMESECRET_PASSPHRASE
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: DRIVER_TELEGRAM_ID
        sync: false
      - key: GROUP_TELEGRAM_ID
        sync: false
      - key: SUPERVISORY_TELEGRAM_ID
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_VISION_MODEL
        sync: false
      - key: API_NINJAS_API_KEY
        sync: false
      - key: VIN_PROVIDER
        sync: false
