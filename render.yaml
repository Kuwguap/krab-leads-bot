# Two separate services so only ONE process runs the Telegram bot (avoids 409 Conflict).
# - Web: admin dashboard API (no Telegram).
# - Worker: Telegram bot (single instance, no scaling).
services:
  - type: web
    name: krabsleads-admin
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python admin_dashboard.py
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
  - type: worker
    name: krabsleads-bot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: MONDAY_API_KEY
        sync: false
      - key: MONDAY_BOARD_ID
        sync: false
      - key: ONETIMESECRET_USERNAME
        sync: false
      - key: ONETIMESECRET_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: DRIVER_TELEGRAM_ID
        sync: false
      - key: GROUP_TELEGRAM_ID
        sync: false
      - key: SUPERVISORY_TELEGRAM_ID
        sync: false
